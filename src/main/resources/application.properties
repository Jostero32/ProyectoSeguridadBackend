spring.application.name=Messenger

spring.datasource.url=jdbc:postgresql://localhost:5432/messenger_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true

# MinIO storage
# endpoint   → URL interna desde Spring Boot a MinIO (subir, eliminar)
# public-url → URL con la que se firman las presigned URLs y las URLs de avatar
#              (debe ser resoluble por el cliente final)
# En dev local (Spring desde el IDE) ambos apuntan a localhost.
# En Docker, docker-compose sobreescribe storage.endpoint con el hostname interno.
storage.endpoint=http://localhost:9000
storage.public-url=http://localhost:9000
storage.access-key=minioadmin
storage.secret-key=minioadmin
storage.bucket=messenger-archivos
storage.bucket-avatars=messenger-avatars

# Multipart upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB
